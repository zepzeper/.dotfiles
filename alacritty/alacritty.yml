live_config_reload: true

# ~/.config/alacritty/alacritty.yml
shell:
  program: /bin/zsh  # Your shell
  args:
    - --login

# Ensure terminal type matches tmux
env:
  TERM: tmux-256color

# Fix key interpretation for tmux/Vim
key_bindings:
  - { key: Y, mods: Control, chars: "\x1B[27;5;89~" }  # Prevent conflict with tmux prefix

font:
  size: 14
  normal:
    family: "JetBrainsMono Nerd Font"
    style: Regular
  bold:
    style: Bold
  italic:
    style: Regular
  bold_italic:
    style: Bold Italic

window:
  option_as_alt: Both
  # Window padding (changes require restart)
  #
  # Blank space added around the window in pixels. This padding is not scaled by
  # DPI and the specified value is always added at both opposing sides.
  padding:
    x: 12
    y: 12

  # Spread additional padding evenly around the terminal content.
  dynamic_padding: false

  # Window decorations
  decorations: buttonless
  #
  # Startup Mode (changes require restart)
  #
  # Values for `startup_mode`:
  #   - Windowed
  #   - Maximized
  #   - Fullscreen
  #
  # Values for `startup_mode` (macOS only):
  #   - SimpleFullscreen
  startup_mode: Windowed

  # Background opacity
  opacity: .9

colors:
  # Basic colors
  primary:
    background: "#18191a"
    foreground: "#cdcdcd"

  # Normal colors
  normal:
    black: "#282830"       # line
    red: "#d2788c"         # error
    green: "#8faf77"       # plus
    yellow: "#e6be8c"      # warning, delta
    blue: "#7894ab"        # keyword
    magenta: "#b9a3ba"     # parameter
    cyan: "#8ca0dc"        # hint
    white: "#c7c7d4"       # property

  # Bright colors
  bright:
    black: "#646477"       # comment
    red: "#be8c8c"         # func
    green: "#deb896"       # string
    yellow: "#d2a374"      # number
    blue: "#bad1ce"        # builtin
    magenta: "#b4b4ce"     # constant
    cyan: "#96a3b2"        # operator
    white: "#878787"       # floatBorder
